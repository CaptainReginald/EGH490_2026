# Training configuration for image segmentation

# Project settings
project: "cgras_segmentation"
name: "2025_genera_model"
model_path: "cgras_segmentation/2025_genera_model5/weights/best.pt"
yaml_path:  "Data/2025_cgras/segmentation_outputs/2025_genera_model/2025_genera_model_filtered_split_tiled_balanced/cgras_data.yaml"

# Training parameters
classes: [0, 1]  # Coral and Polyp
pretrained: true
epochs: 1000
batch_size: 0.95
workers: 4
save_period: 10
patience: 25
mask_overlap: false
device: 0  # device = [0, 1, 2, 3]
resume: true

# Augmentation parameters
image_size: 640
scale: 0.2
flipud: 0.5
fliplr: 0.5